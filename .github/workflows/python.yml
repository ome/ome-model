name: Python linting

on:
  pull_request:
    branches:
      - '*'

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v4
      - name: Lint with Ruff
        run: ruff check --output-format=github
